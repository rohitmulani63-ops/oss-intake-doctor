name: Documentation issue
description: Report unclear, missing, or incorrect docs.
title: "[Docs]: "
labels: ["docs"]
body:
  - type: textarea
    id: location
    attributes:
      label: Where is the documentation issue?
      description: Link or file path if possible.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is wrong or missing?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested fix
      description: Optional. What would make it clearer?
    validations:
      required: false

